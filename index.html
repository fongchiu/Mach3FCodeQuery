        button { background:#2c5f8a; border:none; border-radius:1rem; padding:0.8rem 2rem; color:white; font-weight:600; cursor:pointer; }
        .result-box { background:rgba(15,25,35,0.7); border-radius:1.5rem; padding:1.5rem; min-height:100px; }
        .result-item { background:rgba(255,255,255,0.06); margin-bottom:0.7rem; padding:0.6rem 1rem; border-radius:1rem; border-left:4px solid #4a8bc2; display:flex; flex-wrap:wrap; gap:0.5rem 1rem; align-items:baseline; }
        .func-en { font-weight:700; color:#d9e6f2; }
        .func-zh { background:#2e4559; padding:0.2rem 0.8rem; border-radius:1rem; color:#f2e9c2; }

</head>

// 索引构建
const index = {};
DATA.forEach(item => {
    const key = item.attr + '|' + item.code;
    if (!index[key]) index[key] = [];
    index[key].push(item);
});

function search() {
    const code = parseInt(document.getElementById('codeInput').value.trim());
    const attr = document.getElementById('attrSelect').value;
    const box = document.getElementById('resultContainer');
    if (isNaN(code)) { box.innerHTML = '<span style="color:#ff9999;">请输入有效的数字代码</span>'; return; }
    const key = attr + '|' + code;
    const results = index[key] || [];
    if (results.length === 0) {
        box.innerHTML = '<span style="color:#aaa;">未找到匹配项</span>';
        return;
    }
    box.innerHTML = results.map(r => `
        <div class="result-item">
            <span class="code-badge">${r.code}</span>
            <span class="func-en">${r.name}</span>
            <span class="func-zh">${r.zh}</span>
        </div>
    `).join('');
}
</script>
